<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍎 사과 게임 허브</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{background:#0f1a0f;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}

/* 배경 파티클 */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}

.hub{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:28px;padding:24px 16px;}

.logo{text-align:center;}
.logo h1{font-size:42px;color:#f5c842;text-shadow:0 0 30px #f5c84266;font-weight:900;letter-spacing:2px;}
.logo p{font-size:14px;color:#6a9a6a;margin-top:6px;}

.cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}

.game-card{
  width:180px;padding:28px 16px;border-radius:20px;
  border:2px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);
  cursor:pointer;text-align:center;
  transition:all 0.2s;touch-action:manipulation;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  text-decoration:none;
}
.game-card:active{transform:scale(0.96);}
.game-card:hover{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.08);transform:translateY(-4px);}
.game-card .icon{font-size:52px;}
.game-card .name{font-size:17px;font-weight:bold;color:#fff;}
.game-card .desc{font-size:12px;color:#888;line-height:1.6;}
.game-card .badge{
  padding:4px 12px;border-radius:20px;font-size:11px;font-weight:bold;margin-top:4px;
}
.badge-puzzle{background:rgba(245,200,66,0.2);color:#f5c842;border:1px solid #f5c84244;}
.badge-survivor{background:rgba(255,80,80,0.2);color:#ff8080;border:1px solid #ff808044;}

.footer{color:#333;font-size:11px;text-align:center;}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="hub">
  <div class="logo">
    <h1>🍎 사과 게임</h1>
    <p>플레이할 게임을 선택하세요</p>
  </div>

  <div class="cards">
    <a class="game-card" href="puzzle.html">
      <div class="icon">🍎</div>
      <div class="name">사과 상자</div>
      <div class="desc">드래그로 합이 10이 되는<br>사과를 묶어 없애세요!</div>
      <div class="badge badge-puzzle">퍼즐 · 120초</div>
    </a>
    <a class="game-card" href="survivor.html">
      <div class="icon">⚔️</div>
      <div class="name">사과 서바이버</div>
      <div class="desc">몰려오는 적을 처치하며<br>최대한 오래 살아남으세요!</div>
      <div class="badge badge-survivor">서바이버 · 무한</div>
    </a>
  </div>

  <div class="footer">hnr09 · Powered by Firebase</div>
</div>

<script>
// 배경 애플 파티클
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize', resize);

const apples = [];
for(let i=0;i<18;i++){
  apples.push({
    x:Math.random()*1200, y:Math.random()*800,
    size:16+Math.random()*24,
    vy:20+Math.random()*30,
    vx:(Math.random()-0.5)*10,
    rot:Math.random()*Math.PI*2,
    rotV:(Math.random()-0.5)*1.5,
    alpha:0.08+Math.random()*0.12,
  });
}

function drawBg(ts){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0f1a0f'; ctx.fillRect(0,0,W,H);
  const dt=0.016;
  for(const a of apples){
    a.y+=a.vy*dt; a.x+=a.vx*dt; a.rot+=a.rotV*dt;
    if(a.y>H+50){a.y=-50;a.x=Math.random()*W;}
    ctx.save();
    ctx.globalAlpha=a.alpha;
    ctx.translate(a.x,a.y); ctx.rotate(a.rot);
    ctx.font=`${a.size*2}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🍎',0,0);
    ctx.restore();
  }
  requestAnimationFrame(drawBg);
}
requestAnimationFrame(drawBg);
</script>
</body>
</html>
